<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Haven Address Lookup</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --hover: #f1f1f1;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 24px;
    }

    .search-wrap {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      z-index: 1000;
      display: none;
    }

    .dropdown.open {
      display: block;
    }

    .dropdown-item {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover,
    .dropdown-item.active {
      background: var(--hover);
    }

    .dropdown-item.empty {
      color: var(--muted);
      cursor: default;
    }

    .dropdown-item.empty:hover {
      background: #fff;
    }

    .status {
      max-width: 720px;
      width: 100%;
      margin: 12px auto 0;
      padding: 0 24px;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .status.error {
      color: var(--error);
    }

    main {
      max-width: 720px;
      width: 100%;
      margin: 16px auto 48px;
      padding: 0 24px;
      flex: 1;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #eee;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header { padding: 32px 16px 12px; }
      main { padding: 0 16px; margin-bottom: 32px; }
      .status { padding: 0 16px; }
      #map { height: 380px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>New Haven Address Lookup</h1>
    <p class="subtitle">Start typing an address to see matches from the community database.</p>

    <div class="search-wrap">
      <input
        type="text"
        id="address"
        placeholder="e.g. 165 Church St"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="dropdown" id="dropdown" role="listbox"></div>
    </div>
  </header>

  <div class="status" id="status"></div>

  <main>
    <div id="map"></div>
  </main>

  <footer>
    Map &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // ---- Supabase config ----
    const SUPABASE_URL = 'https://llbpuplxoeyctivvdbdp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RTyyw2Rdo47vL3jiq7c6gw_HflWeurD';
    const TABLE = 'community_addresses';
    const ADDRESS_COL = 'Address';
    const RESULT_LIMIT = 10;

    // ---- Map ----
    const NEW_HAVEN_CENTER = [41.3083, -72.9279];
    const DEFAULT_ZOOM = 13;
    const RESULT_ZOOM = 17;

    const map = L.map('map').setView(NEW_HAVEN_CENTER, DEFAULT_ZOOM);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    let currentMarker = null;

    // ---- DOM ----
    const input = document.getElementById('address');
    const dropdown = document.getElementById('dropdown');
    const statusEl = document.getElementById('status');

    let activeIndex = -1;
    let currentResults = [];
    let activeRequestId = 0;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('error', isError);
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    async function searchAddresses(query) {
      const url = new URL(`${SUPABASE_URL}/rest/v1/${TABLE}`);
      // PostgREST: ilike uses * as wildcard
      url.searchParams.set(ADDRESS_COL, `ilike.*${query}*`);
      url.searchParams.set('select', '*');
      url.searchParams.set('limit', String(RESULT_LIMIT));

      console.log('[supabase] GET', url.toString());

      const res = await fetch(url.toString(), {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Accept: 'application/json',
        },
      });
      const text = await res.text();
      let body;
      try { body = JSON.parse(text); } catch { body = text; }
      if (!res.ok) {
        console.error('[supabase] error', res.status, body);
        const detail = (body && body.message) ? body.message : text;
        throw new Error(`HTTP ${res.status} — ${detail}`);
      }
      console.log('[supabase] ok', Array.isArray(body) ? `${body.length} rows` : body);
      return body;
    }

    function renderDropdown(results, query) {
      dropdown.innerHTML = '';
      activeIndex = -1;
      currentResults = results;

      if (!results || results.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'dropdown-item empty';
        empty.textContent = query ? 'No matches' : '';
        if (query) {
          dropdown.appendChild(empty);
          dropdown.classList.add('open');
        } else {
          dropdown.classList.remove('open');
        }
        return;
      }

      results.forEach((row, i) => {
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        item.role = 'option';
        item.textContent = row[ADDRESS_COL] ?? '(no address)';
        item.addEventListener('mousedown', (e) => {
          // mousedown so it fires before input blur
          e.preventDefault();
          selectResult(i);
        });
        dropdown.appendChild(item);
      });
      dropdown.classList.add('open');
    }

    // Try common column-name conventions for coordinates
    function extractLatLon(row) {
      const latKeys = ['lat', 'Lat', 'latitude', 'Latitude', 'LATITUDE', 'y', 'Y'];
      const lonKeys = ['lng', 'Lng', 'lon', 'Lon', 'long', 'Long', 'longitude', 'Longitude', 'LONGITUDE', 'x', 'X'];
      let lat = null, lon = null;
      for (const k of latKeys) if (row[k] != null) { lat = parseFloat(row[k]); break; }
      for (const k of lonKeys) if (row[k] != null) { lon = parseFloat(row[k]); break; }
      if (Number.isFinite(lat) && Number.isFinite(lon)) return [lat, lon];
      return null;
    }

    // Find a field by trying several name variants (case + separator variants).
    // Returns the first non-empty value, or null.
    function findField(row, candidates) {
      for (const key of candidates) {
        if (row[key] != null && String(row[key]).trim() !== '') {
          return row[key];
        }
      }
      return null;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function buildPopupHtml(row) {
      const owner = findField(row, ['Owner', 'owner', 'OWNER', 'owner_name', 'OwnerName']);
      const principal = findField(row, ['Principal', 'principal', 'PRINCIPAL']);
      const principalPrincipal = findField(row, [
        'Principal Principal',
        'principal principal',
        'PrincipalPrincipal',
        'principalPrincipal',
        'principal_principal',
        'Principal_Principal',
        'PRINCIPAL_PRINCIPAL',
        'PrincipalsPrincipal',
        'Principal of Principal',
        'principal_of_principal',
      ]);

      const address = row[ADDRESS_COL] ?? '';

      const fmt = (label, value) => `
        <div style="margin-top:6px;">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:#6b6b6b;">${label}</div>
          <div style="font-size:13px;color:#1a1a1a;">${value != null ? escapeHtml(value) : '<span style=\"color:#9b9b9b;\">—</span>'}</div>
        </div>`;

      return `
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-width:200px;max-width:260px;">
          <div style="font-size:14px;font-weight:600;color:#1a1a1a;">${escapeHtml(address)}</div>
          ${fmt('Owner', owner)}
          ${fmt('Principal', principal)}
          ${fmt('Principal Principal', principalPrincipal)}
        </div>
      `;
    }

    function selectResult(index) {
      const row = currentResults[index];
      if (!row) return;

      input.value = row[ADDRESS_COL] ?? '';
      dropdown.classList.remove('open');

      const coords = extractLatLon(row);
      if (!coords) {
        setStatus(
          `Selected "${row[ADDRESS_COL]}", but no coordinates found in this row.`,
          true
        );
        console.warn('Row has no recognizable lat/lon columns:', row);
        return;
      }

      if (currentMarker) map.removeLayer(currentMarker);
      currentMarker = L.marker(coords)
        .addTo(map)
        .bindPopup(buildPopupHtml(row));
      // Open popup once the flyTo finishes, so the popup tail anchors correctly
      map.once('moveend', () => currentMarker && currentMarker.openPopup());
      map.flyTo(coords, RESULT_ZOOM, { duration: 1.2 });
      setStatus(row[ADDRESS_COL]);
      console.log('[row keys]', Object.keys(row));
    }

    function setActive(index) {
      const items = dropdown.querySelectorAll('.dropdown-item:not(.empty)');
      items.forEach((el, i) => el.classList.toggle('active', i === index));
      activeIndex = index;
      if (items[index]) {
        items[index].scrollIntoView({ block: 'nearest' });
      }
    }

    const handleInput = debounce(async (query) => {
      const requestId = ++activeRequestId;
      if (!query) {
        renderDropdown([], '');
        setStatus('');
        return;
      }
      try {
        const results = await searchAddresses(query);
        if (requestId !== activeRequestId) return; // stale
        renderDropdown(results, query);
        setStatus('');
      } catch (err) {
        if (requestId !== activeRequestId) return;
        console.error(err);
        setStatus(err.message || 'Could not reach the address database.', true);
        // Surface the error in the dropdown too, so it's visible
        dropdown.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'dropdown-item empty';
        item.textContent = err.message || 'Request failed';
        dropdown.appendChild(item);
        dropdown.classList.add('open');
      }
    }, 180);

    input.addEventListener('input', (e) => {
      handleInput(e.target.value.trim());
    });

    input.addEventListener('keydown', (e) => {
      const items = dropdown.querySelectorAll('.dropdown-item:not(.empty)');
      if (!dropdown.classList.contains('open') || items.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive((activeIndex + 1) % items.length);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive((activeIndex - 1 + items.length) % items.length);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0) selectResult(activeIndex);
        else if (currentResults.length > 0) selectResult(0);
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
      }
    });

    input.addEventListener('focus', () => {
      if (currentResults.length > 0) dropdown.classList.add('open');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) {
        dropdown.classList.remove('open');
      }
    });
  </script>
</body>
</html>
