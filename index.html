<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Haven Address Lookup</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --hover: #f1f1f1;
      --chip-bg: #f3f4f6;
      --chip-bg-hover: #e5e7eb;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 24px;
    }

    .search-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      /* Leaflet's control containers (.leaflet-top etc.) sit at z-index: 1000.
         Bump the dropdown above them so the +/- buttons don't peek through. */
      z-index: 1100;
      display: none;
    }

    .dropdown.open { display: block; }

    .dropdown-item {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover, .dropdown-item.active { background: var(--hover); }
    .dropdown-item.empty { color: var(--muted); cursor: default; }
    .dropdown-item.empty:hover { background: #fff; }

    .status {
      max-width: 720px;
      width: 100%;
      margin: 12px auto 0;
      padding: 0 24px;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .status.error { color: var(--error); }

    main {
      max-width: 720px;
      width: 100%;
      margin: 16px auto 48px;
      padding: 0 24px;
      flex: 1;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #eee;
    }

    .clear-filter {
      display: none;
      margin: 8px auto 0;
      max-width: 720px;
      padding: 0 24px;
      font-size: 13px;
    }

    .clear-filter.visible { display: block; }

    .clear-filter button {
      background: none;
      border: none;
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }

    /* Popup chip styles (used inside Leaflet popups) */
    .leaflet-popup-content { margin: 12px 14px !important; }

    .popup-card {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-width: 220px;
      max-width: 280px;
    }

    .popup-address {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 4px;
    }

    .popup-row { margin-top: 8px; }

    .popup-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .popup-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .popup-chip {
      display: inline-block;
      padding: 3px 8px;
      font-size: 12px;
      font-family: inherit;
      color: var(--fg);
      background: var(--chip-bg);
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 0.1s;
    }

    .popup-chip:hover {
      background: var(--chip-bg-hover);
      border-color: var(--border);
    }

    .popup-empty {
      font-size: 12px;
      color: #9b9b9b;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    footer a { color: var(--muted); }

    @media (max-width: 600px) {
      header { padding: 32px 16px 12px; }
      main { padding: 0 16px; margin-bottom: 32px; }
      .status, .clear-filter { padding: 0 16px; }
      #map { height: 380px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>New Haven Address Lookup</h1>
    <p class="subtitle">Start typing an address to see matches from the community database.</p>

    <div class="search-wrap">
      <input
        type="text"
        id="address"
        placeholder="e.g. 165 Church St"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="dropdown" id="dropdown" role="listbox"></div>
    </div>
  </header>

  <div class="status" id="status"></div>
  <div class="clear-filter" id="clear-filter">
    <button id="clear-filter-btn">← Clear filter</button>
  </div>

  <main>
    <div id="map"></div>
  </main>

  <footer>
    Map &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // ---- Supabase config ----
    const SUPABASE_URL = 'https://llbpuplxoeyctivvdbdp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RTyyw2Rdo47vL3jiq7c6gw_HflWeurD';
    const TABLE = 'community_addresses';
    const ADDRESS_COL = 'Address';
    const SEARCH_LIMIT = 10;
    const FILTER_LIMIT = 500;

    // ---- Map ----
    const NEW_HAVEN_CENTER = [41.3083, -72.9279];
    const DEFAULT_ZOOM = 13;
    const RESULT_ZOOM = 17;

    const map = L.map('map').setView(NEW_HAVEN_CENTER, DEFAULT_ZOOM);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    // Holds all currently shown markers
    let markerLayer = L.layerGroup().addTo(map);

    // ---- DOM ----
    const input = document.getElementById('address');
    const dropdown = document.getElementById('dropdown');
    const statusEl = document.getElementById('status');
    const clearFilterEl = document.getElementById('clear-filter');
    const clearFilterBtn = document.getElementById('clear-filter-btn');

    let activeIndex = -1;
    let currentResults = [];
    let activeRequestId = 0;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('error', isError);
    }

    function showClearFilter(visible) {
      clearFilterEl.classList.toggle('visible', visible);
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ---- Supabase calls ----
    async function supabaseGet(searchParams) {
      const url = new URL(`${SUPABASE_URL}/rest/v1/${TABLE}`);
      for (const [k, v] of Object.entries(searchParams)) url.searchParams.set(k, v);

      console.log('[supabase] GET', url.toString());
      const res = await fetch(url.toString(), {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Accept: 'application/json',
        },
      });
      const text = await res.text();
      let body;
      try { body = JSON.parse(text); } catch { body = text; }
      if (!res.ok) {
        console.error('[supabase] error', res.status, body);
        const detail = (body && body.message) ? body.message : text;
        throw new Error(`HTTP ${res.status} — ${detail}`);
      }
      console.log('[supabase] ok', Array.isArray(body) ? `${body.length} rows` : body);
      return body;
    }

    async function searchAddresses(query) {
      return supabaseGet({
        [ADDRESS_COL]: `ilike.*${query}*`,
        select: '*',
        limit: String(SEARCH_LIMIT),
      });
    }

    async function filterByColumn(column, value, mode) {
      // mode: 'eq' (exact) or 'ilike' (substring)
      let filter;
      if (mode === 'eq') {
        // PostgREST: wrap value in double quotes to allow commas/spaces; escape internal quotes
        const escaped = String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        filter = `eq."${escaped}"`;
      } else {
        filter = `ilike.*${value}*`;
      }
      return supabaseGet({
        [column]: filter,
        select: '*',
        limit: String(FILTER_LIMIT),
      });
    }

    // ---- Field detection ----
    // Returns { key, value } so we know the actual db column name to filter on.
    function findField(row, candidates) {
      for (const key of candidates) {
        if (row[key] != null && String(row[key]).trim() !== '') {
          return { key, value: row[key] };
        }
      }
      return null;
    }

    function extractLatLon(row) {
      const latKeys = ['lat', 'Lat', 'latitude', 'Latitude', 'LATITUDE', 'y', 'Y'];
      const lonKeys = ['lng', 'Lng', 'lon', 'Lon', 'long', 'Long', 'longitude', 'Longitude', 'LONGITUDE', 'x', 'X'];
      let lat = null, lon = null;
      for (const k of latKeys) if (row[k] != null) { lat = parseFloat(row[k]); break; }
      for (const k of lonKeys) if (row[k] != null) { lon = parseFloat(row[k]); break; }
      if (Number.isFinite(lat) && Number.isFinite(lon)) return [lat, lon];
      return null;
    }

    function getOwnerField(row) {
      return findField(row, ['Owner', 'owner', 'OWNER', 'owner_name', 'OwnerName']);
    }
    function getPrincipalField(row) {
      return findField(row, ['Principal', 'principal', 'PRINCIPAL']);
    }
    function getPrincipalPrincipalField(row) {
      return findField(row, [
        'Principal Principal', 'principal principal',
        'PrincipalPrincipal', 'principalPrincipal',
        'principal_principal', 'Principal_Principal', 'PRINCIPAL_PRINCIPAL',
        'PrincipalsPrincipal', 'Principal of Principal', 'principal_of_principal',
      ]);
    }

    // ---- Popup HTML ----
    function chipsHtml(field, mode) {
      if (!field) return '<span class="popup-empty">—</span>';
      const parts = String(field.value)
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);
      if (parts.length === 0) return '<span class="popup-empty">—</span>';

      return `<div class="popup-chips">${parts.map(p => `
        <button
          type="button"
          class="popup-chip"
          data-col="${escapeHtml(field.key)}"
          data-val="${escapeHtml(p)}"
          data-mode="${mode}"
          title="Click to find properties matching ${escapeHtml(p)}"
        >${escapeHtml(p)}</button>
      `).join('')}</div>`;
    }

    function buildPopupHtml(row) {
      const owner = getOwnerField(row);
      const principal = getPrincipalField(row);
      const pp = getPrincipalPrincipalField(row);
      const address = row[ADDRESS_COL] ?? '';

      return `
        <div class="popup-card">
          <div class="popup-address">${escapeHtml(address)}</div>
          <div class="popup-row">
            <div class="popup-label">Owner</div>
            ${chipsHtml(owner, 'eq')}
          </div>
          <div class="popup-row">
            <div class="popup-label">Principal</div>
            ${chipsHtml(principal, 'ilike')}
          </div>
          <div class="popup-row">
            <div class="popup-label">Principal Principal</div>
            ${chipsHtml(pp, 'ilike')}
          </div>
        </div>
      `;
    }

    // ---- Map rendering ----
    function clearMarkers() {
      markerLayer.clearLayers();
    }

    function plotRows(rows, opts = {}) {
      clearMarkers();

      const placed = [];
      rows.forEach(row => {
        const coords = extractLatLon(row);
        if (!coords) return;
        const m = L.marker(coords).bindPopup(buildPopupHtml(row));
        m.addTo(markerLayer);
        placed.push({ row, coords, marker: m });
      });

      if (placed.length === 0) return placed;

      if (placed.length === 1) {
        const [{ coords, marker }] = placed;
        map.once('moveend', () => marker.openPopup());
        map.flyTo(coords, RESULT_ZOOM, { duration: 1.0 });
      } else {
        const group = L.featureGroup(placed.map(p => p.marker));
        map.flyToBounds(group.getBounds().pad(0.15), { duration: 1.0 });
      }

      return placed;
    }

    // ---- Search dropdown ----
    function renderDropdown(results, query) {
      dropdown.innerHTML = '';
      activeIndex = -1;
      currentResults = results;

      if (!results || results.length === 0) {
        if (query) {
          const empty = document.createElement('div');
          empty.className = 'dropdown-item empty';
          empty.textContent = 'No matches';
          dropdown.appendChild(empty);
          dropdown.classList.add('open');
        } else {
          dropdown.classList.remove('open');
        }
        return;
      }

      results.forEach((row, i) => {
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        item.role = 'option';
        item.textContent = row[ADDRESS_COL] ?? '(no address)';
        item.addEventListener('mousedown', (e) => {
          e.preventDefault();
          selectResult(i);
        });
        dropdown.appendChild(item);
      });
      dropdown.classList.add('open');
    }

    function selectResult(index) {
      const row = currentResults[index];
      if (!row) return;

      input.value = row[ADDRESS_COL] ?? '';
      dropdown.classList.remove('open');
      showClearFilter(false);

      const placed = plotRows([row]);
      if (placed.length === 0) {
        setStatus(`Selected "${row[ADDRESS_COL]}", but no coordinates found in this row.`, true);
        console.warn('Row has no recognizable lat/lon columns:', row);
        return;
      }
      setStatus(row[ADDRESS_COL]);
      console.log('[row keys]', Object.keys(row));
    }

    function setActive(index) {
      const items = dropdown.querySelectorAll('.dropdown-item:not(.empty)');
      items.forEach((el, i) => el.classList.toggle('active', i === index));
      activeIndex = index;
      if (items[index]) items[index].scrollIntoView({ block: 'nearest' });
    }

    const handleInput = debounce(async (query) => {
      const requestId = ++activeRequestId;
      if (!query) {
        renderDropdown([], '');
        setStatus('');
        return;
      }
      try {
        const results = await searchAddresses(query);
        if (requestId !== activeRequestId) return;
        renderDropdown(results, query);
        setStatus('');
      } catch (err) {
        if (requestId !== activeRequestId) return;
        console.error(err);
        setStatus(err.message || 'Could not reach the address database.', true);
        dropdown.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'dropdown-item empty';
        item.textContent = err.message || 'Request failed';
        dropdown.appendChild(item);
        dropdown.classList.add('open');
      }
    }, 180);

    input.addEventListener('input', (e) => {
      handleInput(e.target.value.trim());
    });

    input.addEventListener('keydown', (e) => {
      const items = dropdown.querySelectorAll('.dropdown-item:not(.empty)');
      if (!dropdown.classList.contains('open') || items.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive((activeIndex + 1) % items.length);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive((activeIndex - 1 + items.length) % items.length);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0) selectResult(activeIndex);
        else if (currentResults.length > 0) selectResult(0);
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
      }
    });

    input.addEventListener('focus', () => {
      if (currentResults.length > 0) dropdown.classList.add('open');
    });

    // ---- Chip click handler (delegated, handles Leaflet popup contents) ----
    async function onChipClick(column, value, mode) {
      if (!column || !value) return;
      const labelMode = mode === 'eq' ? '=' : '~';
      setStatus(`Searching for properties where ${column} ${labelMode} "${value}"…`);
      showClearFilter(true);

      try {
        const rows = await filterByColumn(column, value, mode);
        if (rows.length === 0) {
          setStatus(`No properties found for ${column} ${labelMode} "${value}".`, true);
          clearMarkers();
          return;
        }
        const placed = plotRows(rows);
        const skipped = rows.length - placed.length;
        const noun = placed.length === 1 ? 'property' : 'properties';
        let msg = `${placed.length} ${noun} where ${column} ${labelMode} "${value}"`;
        if (skipped > 0) msg += ` (${skipped} without coordinates)`;
        setStatus(msg);
      } catch (err) {
        console.error(err);
        setStatus(err.message || 'Filter failed.', true);
      }
    }

    document.addEventListener('click', (e) => {
      const chip = e.target.closest('.popup-chip');
      if (chip) {
        e.preventDefault();
        e.stopPropagation();
        onChipClick(chip.dataset.col, chip.dataset.val, chip.dataset.mode);
        return;
      }
      if (!e.target.closest('.search-wrap')) {
        dropdown.classList.remove('open');
      }
    });

    clearFilterBtn.addEventListener('click', () => {
      clearMarkers();
      setStatus('');
      showClearFilter(false);
      input.value = '';
      currentResults = [];
      map.flyTo(NEW_HAVEN_CENTER, DEFAULT_ZOOM, { duration: 0.8 });
    });
  </script>
</body>
</html>
